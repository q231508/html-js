    <script>
        function main(){
            document.querySelectorAll("#home,#about,#projects,#writeups,#extra").forEach(link => {
                link.addEventListener("mouseover", () =>{
                    link.style.backgroundColor= "aliceblue";
                    link.style.color="black";

        window.addEventListener("load", main);

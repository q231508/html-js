<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=utf-8">
            <style>
                /* From https://jsfiddle.net/CRSVU/ */
                html, body { height: 100%; padding: 0; margin: 0; }
                div { width: 50%; 
                    height: 50%; 
                    float: left;
                    outline: 1px solid rgb(0, 0, 0);}
                p {
                    font-weight: bold;
                    padding-left: 5px;
                }
                #q1 { background-color: #ffffff; }
                #q2 { background-color: #ffffff; }
                #q3 { background-color: #ffffff; }
                #q4 { background-color: #ffffff; }
            </style>
    </head>
    <body>
        <div id="q1">
            <h1>Q1</h1>
            <p id="xpos">X Position: </p>
            <p id="ypos">Y Position: </p>
            <p id="pct">% Away from next quadrant: </p>
        </div>

        <div id="q2">
            <h1>Q2</h1>
            <p id="xpos">X Position: </p>
            <p id="ypos">Y Position: </p>
            <p id="pct">% Away from next quadrant: </p>
        </div>

        <div id="q4">
            <h1>Q4</h1>
            <p id="xpos" >X Position: </p>
            <p id="ypos">Y Position: </p>
            <p id="pct">% Away from next quadrant: </p>
        </div>

        <div id="q3">
            <h1>Q3</h1>
            <p id="xpos">X Position: </p>
            <p id="ypos">Y Position: </p>
            <p id="pct">% Away from next quadrant: </p>
        </div>
    </body>
    <script>
        function update_pos(){
            /* Thanks to https://medium.com/@ryan_forrester_/how-to-get-mouse-position-in-javascript-37e4772a3f21
                For the simple example
            */
            x = Math.floor(event.clientX - innerWidth/2);
            y = Math.floor(innerHeight/2 - event.clientY);
            area_entered = Math.abs(x) * Math.abs(y); 
            q_area = window.innerWidth/2 * innerHeight/2;
            pct = area_entered / q_area;
            pct *= 100;
            hsl = Math.abs(pct)

            if (x < 0 && y > 0){
                parentDOM = document.getElementById("q1");
                hue = 0
            }
            else if (x > 0 && y > 0){
                parentDOM = document.getElementById("q2");
                hue = 217
            }
            else if (x > 0 && y < 0){
                parentDOM = document.getElementById("q3");
                hue = 100
            }
            else if (x < 0 && y < 0){
                parentDOM = document.getElementById("q4");
                hue = 50
            }

            parentDOM.querySelector("#xpos").innerHTML = `X Position: ${x}px`;
            parentDOM.querySelector("#ypos").innerHTML = `Y Position: ${y}px`;
            parentDOM.querySelector("#pct").innerHTML = `% Away from next quadrant: ${pct}`;
            parentDOM.querySelector("#pct").innerHTML = `% Away from next quadrant: ${pct}`;
            
            parentDOM.querySelectorAll("p").forEach( i => {
                i.style.color = `hsl(${(hue-180) % 360}, 100%, ${Math.abs((pct)-100)*.75}%)`;

            });
            parentDOM.querySelectorAll("h1").forEach( i => {
                i.style.color = `hsl(${(hue-180) % 360}, 100%, ${Math.abs(pct-100)*.75}%)`;
            });
            parentDOM.style.backgroundColor = `hsl(${hue}, 100%, ${hsl*2}%)`;
            parentDOM.style.outline = `1px solid hsl(0, 0%, ${Math.abs(pct-100)}%)`;
        }

        function main(){
            document.addEventListener("mousemove", update_pos);
        }

        window.addEventListener("load", main);
    </script>
</html>
